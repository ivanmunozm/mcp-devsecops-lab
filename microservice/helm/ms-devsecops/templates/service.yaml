# microservice/helm/ms-devsecops/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ms-devsecops.fullname" . }}
  labels:
    {{- include "ms-devsecops.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "ms-devsecops.selectorLabels" . | nindent 4 }}