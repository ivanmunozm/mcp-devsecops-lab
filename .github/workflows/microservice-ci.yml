# .github/workflows/microservice-ci.yml
name: Microservice CI

on:
  push:
    paths:
      - 'microservice/**'
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ms-devsecops

jobs:
  # ── Build y push de la imagen a GHCR ─────────────────────────────────────
  build-and-push:
    name: "Build & Push imagen"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Calcular SHA corto — 7 caracteres, mismo formato que metadata-action
      - name: Calcular SHA corto
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Generar metadata de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./microservice
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Invocar el reusable workflow de seguridad ─────────────────────────────
  security-scan:
    name: "Security Scan"
    needs: build-and-push
    permissions:
      contents: read
      security-events: write
      actions: read
      issues: write
    uses: ivanmunozm/mcp-devsecops-lab/.github/workflows/devsecops-reusable.yml@master
    with:
      target_repo: ${{ github.repository }}
      target_branch: ${{ github.ref_name }}
      # Usamos el SHA corto del output del job anterior — coincide exactamente con GHCR
      image_tag: ghcr.io/${{ github.repository_owner }}/ms-devsecops:sha-${{ needs.build-and-push.outputs.short_sha }}
      scan_level: quick
    secrets: inherit

  # ── GitOps: actualizar values.yaml si el security gate pasó ──────────────
  update-deployment:
    name: "GitOps — Update Deployment"
    needs: [build-and-push, security-scan]
    runs-on: ubuntu-latest
    if: needs.security-scan.outputs.security_passed == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Actualizar image tag en values.yaml
        run: |
          SHORT_SHA="${{ needs.build-and-push.outputs.short_sha }}"
          IMAGE_TAG="sha-${SHORT_SHA}"

          echo "Actualizando image.tag a: $IMAGE_TAG"

          sed -i "s|tag: .*|tag: \"${IMAGE_TAG}\"|" \
            microservice/helm/ms-devsecops/values.yaml

          grep "tag:" microservice/helm/ms-devsecops/values.yaml

      - name: Commit y push del nuevo tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SHORT_SHA="${{ needs.build-and-push.outputs.short_sha }}"

          git add microservice/helm/ms-devsecops/values.yaml
          git diff --staged --quiet || git commit -m \
            "chore(gitops): deploy ms-devsecops sha-${SHORT_SHA}

            Security gate: PASSED
            Image: ghcr.io/${{ github.repository_owner }}/ms-devsecops:sha-${SHORT_SHA}
            Triggered by: ${{ github.actor }}
            Run: ${{ github.run_id }}"

          git push